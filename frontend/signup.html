<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – Dr. Maaz Khan</title>
  <script>(function(){const t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-bs-theme",t);})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="navbar fixed-top" id="mainNav">
  <div class="container d-flex align-items-center justify-content-between" style="padding:12px 24px">
    <a class="navbar-brand" href="index.html"><span class="brand-cross">✦</span> Dr. Maaz Khan</a>
    <div class="d-flex gap-2 align-items-center">
      <a class="btn btn-primary nav-btn" href="login.html">Login</a>
      <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode">🌙</button>
    </div>
  </div>
</nav>

<section class="auth-section">
  <div class="auth-card">
    <div class="auth-logo"><span class="brand-cross">✦</span> Dr. Maaz Khan</div>
    <h2>Create Account</h2>
    <p class="subtitle">Sign up to book appointments online</p>

    <form id="signupForm" novalidate>
      <div class="mb-3">
        <label class="form-label" for="su-name">Full Name</label>
        <div class="input-wrap">
          <i class="bi bi-person"></i>
          <input type="text" id="su-name" class="form-control" placeholder="Enter your name" required maxlength="100" autocomplete="name"/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label" for="su-email">Email Address</label>
        <div class="input-wrap">
          <i class="bi bi-envelope"></i>
          <input type="email" id="su-email" class="form-control" placeholder="you@email.com" required autocomplete="email"/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label" for="su-password">Password</label>
        <div class="input-wrap" style="position:relative">
          <i class="bi bi-lock"></i>
          <input type="password" id="su-password" class="form-control" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password"/>
          <button type="button" class="pwd-toggle" id="pwdToggle" aria-label="Show/hide password">
            <i class="bi bi-eye" id="pwdIcon"></i>
          </button>
        </div>
        <div class="mt-2" id="pwdStrength" style="display:none">
          <div style="height:4px;border-radius:2px;background:var(--border);overflow:hidden">
            <div id="pwdBar" style="height:100%;width:0;transition:width .3s,background .3s;border-radius:2px"></div>
          </div>
          <small id="pwdLabel" class="text-muted mt-1 d-block"></small>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg" id="signupBtn">
        Create Account <i class="bi bi-arrow-right ms-1"></i>
      </button>
    </form>

    <div class="divider">or sign up with</div>

    <a href="https://mak-iqvm.onrender.com/api/auth/google" class="btn-google">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" aria-hidden="true"/>
      Continue with Google
    </a>

    <p class="auth-footer-text">Already have an account? <a href="login.html">Login →</a></p>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
const API = window.API || "https://mak-iqvm.onrender.com";

// ── Handle OAuth redirect ─────────────────────────────────────
const gToken = new URLSearchParams(window.location.search).get("token");
if (gToken) {
  localStorage.setItem("token", gToken);
  history.replaceState({}, "", window.location.pathname);
  showToast("Welcome! Account created via Google.");
  setTimeout(() => window.location.href = "index.html", 1000);
}

// ── Password strength indicator ──────────────────────────────
const pwdInput    = document.getElementById("su-password");
const pwdStrength = document.getElementById("pwdStrength");
const pwdBar      = document.getElementById("pwdBar");
const pwdLabel    = document.getElementById("pwdLabel");

pwdInput.addEventListener("input", () => {
  const v = pwdInput.value;
  if (!v) { pwdStrength.style.display = "none"; return; }
  pwdStrength.style.display = "";
  let score = 0;
  if (v.length >= 8)              score++;
  if (/[A-Z]/.test(v))           score++;
  if (/[0-9]/.test(v))           score++;
  if (/[^A-Za-z0-9]/.test(v))   score++;
  const levels = [
    { w: "25%", bg: "#ef4444", lbl: "Weak" },
    { w: "50%", bg: "#f59e0b", lbl: "Fair" },
    { w: "75%", bg: "#3b82f6", lbl: "Good" },
    { w: "100%",bg: "#22c55e", lbl: "Strong" },
  ];
  const lvl = levels[Math.max(0, score - 1)];
  pwdBar.style.width      = lvl.w;
  pwdBar.style.background = lvl.bg;
  pwdLabel.textContent    = lvl.lbl;
});

// ── Password toggle ──────────────────────────────────────────
document.getElementById("pwdToggle").addEventListener("click", () => {
  const show = pwdInput.type === "password";
  pwdInput.type = show ? "text" : "password";
  document.getElementById("pwdIcon").className = show ? "bi bi-eye-slash" : "bi bi-eye";
});

// ── Signup ───────────────────────────────────────────────────
document.getElementById("signupForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const btn      = document.getElementById("signupBtn");
  const name     = document.getElementById("su-name").value.trim();
  const email    = document.getElementById("su-email").value.trim();
  const password = pwdInput.value;

  if (!name || !email || !password) {
    showToast("Please fill in all fields.", "error"); return;
  }
  if (password.length < 6) {
    showToast("Password must be at least 6 characters.", "error"); return;
  }

  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account…';

  try {
    const res  = await fetch(`${API}/api/auth/signup`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password }),
    });
    const data = await res.json().catch(() => ({}));

    if (res.ok) {
      // Auto-login after signup
      try {
        const loginRes  = await fetch(`${API}/api/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const loginData = await loginRes.json();
        if (loginData.token) {
          localStorage.setItem("token", loginData.token);
          if (loginData.user) localStorage.setItem("user", JSON.stringify(loginData.user));
          showToast("Welcome! Account created successfully.");
          setTimeout(() => window.location.href = "index.html", 1200);
          return;
        }
      } catch { /* fall through to manual login */ }
      showToast("Account created! Please login.");
      setTimeout(() => window.location.href = "login.html", 1200);
    } else {
      showToast(data.message || "Signup failed. Please try again.", "error");
      btn.disabled  = false;
      btn.innerHTML = 'Create Account <i class="bi bi-arrow-right ms-1"></i>';
    }
  } catch {
    showToast("Cannot connect to server.", "error");
    btn.disabled  = false;
    btn.innerHTML = 'Create Account <i class="bi bi-arrow-right ms-1"></i>';
  }
});

// ── Dark toggle ──────────────────────────────────────────────
const dt = document.getElementById("darkToggle");
if (dt) {
  dt.textContent = document.documentElement.getAttribute("data-bs-theme") === "dark" ? "☀️" : "🌙";
  dt.addEventListener("click", () => {
    const next = document.documentElement.getAttribute("data-bs-theme") === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-bs-theme", next);
    localStorage.setItem("theme", next);
    dt.textContent = next === "dark" ? "☀️" : "🌙";
  });
}
</script>
</body>
</html>
