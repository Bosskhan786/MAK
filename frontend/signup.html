<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
  <div class="container">
    <a class="navbar-brand" href="index.html"><span class="brand-cross">✦</span> Dr. Maaz Khan</a>
    <div class="ms-auto">
      <a class="btn btn-primary nav-btn" href="login.html" id="navLoginBtn">Login</a>
    </div>
  </div>
</nav>

<!-- SIGNUP -->
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-card-logo"><span class="brand-cross">✦</span> Dr. Maaz Khan</div>
    <h2>Create Account</h2>
    <p class="subtitle">Sign up to book appointments online</p>

    <form id="signupForm" novalidate>
      <div class="mb-3">
        <label class="form-label" for="name">Full Name</label>
        <div class="input-icon-wrap">
          <i class="bi bi-person"></i>
          <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-icon-wrap">
          <i class="bi bi-envelope"></i>
          <input type="email" id="email" class="form-control" placeholder="you@email.com" required>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label" for="password">Password</label>
        <div class="input-icon-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-lg" id="signupBtn">
        Create Account <i class="bi bi-arrow-right ms-1"></i>
      </button>
    </form>

    <p class="auth-footer-text">
      Already have an account? <a href="login.html">Login →</a>
    </p>
  </div>
</section>

<script>
document.getElementById("signupForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const btn      = document.getElementById("signupBtn");
  const name     = document.getElementById("name").value.trim();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (password.length < 6) {
    showToast("Password must be at least 6 characters.", "error");
    return;
  }

  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account…';

  try {
    const res  = await fetch("/api/auth/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();

    if (res.ok) {
      // Auto-login after signup
      const loginRes = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const loginData = await loginRes.json();
      if (loginData.token) {
        localStorage.setItem("token", loginData.token);
        showToast("Welcome! Account created successfully.");
        setTimeout(() => window.location.href = "index.html", 1000);
      } else {
        showToast("Account created! Please login.");
        setTimeout(() => window.location.href = "login.html", 1200);
      }
    } else {
      showToast(data.message || "Signup failed", "error");
      btn.disabled  = false;
      btn.innerHTML = 'Create Account <i class="bi bi-arrow-right ms-1"></i>';
    }
  } catch (err) {
    showToast("Cannot connect to server. Is the backend running?", "error");
    btn.disabled  = false;
    btn.innerHTML = 'Create Account <i class="bi bi-arrow-right ms-1"></i>';
  }
});

function showToast(message, type = "success") {
  const el = document.createElement("div");
  el.className = `toast-alert ${type}`;
  el.innerHTML = `<span>${type === "success" ? "✓" : "✕"}</span> ${message}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3800);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
