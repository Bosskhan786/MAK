<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
  <div class="container">
    <a class="navbar-brand" href="index.html"><span class="brand-cross">✦</span> Dr. Maaz Khan</a>
    <div class="ms-auto d-flex gap-2">
      <a class="btn btn-outline-primary" href="signup.html">Sign Up</a>
      <a class="btn btn-primary nav-btn" href="login.html" id="navLoginBtn">Login</a>
    </div>
  </div>
</nav>

<!-- LOGIN -->
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-card-logo"><span class="brand-cross">✦</span> Dr. Maaz Khan</div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Login to manage your appointments</p>

    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-icon-wrap">
          <i class="bi bi-envelope"></i>
          <input type="email" id="email" class="form-control" placeholder="you@email.com" required>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label" for="password">Password</label>
        <div class="input-icon-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-lg" id="loginBtn">
        Login <i class="bi bi-arrow-right ms-1"></i>
      </button>
    </form>

    <p class="auth-footer-text">
      Don't have an account? <a href="signup.html">Create one →</a>
    </p>
  </div>
</section>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const btn   = document.getElementById("loginBtn");
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  btn.disabled    = true;
  btn.innerHTML   = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in…';

  try {
    const res  = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.token) {
      localStorage.setItem("token", data.token);
      showToast("Login successful! Redirecting…");
      setTimeout(() => window.location.href = "index.html", 1200);
    } else {
      showToast(data.message || "Login failed", "error");
      btn.disabled  = false;
      btn.innerHTML = 'Login <i class="bi bi-arrow-right ms-1"></i>';
    }
  } catch (err) {
    showToast("Cannot connect to server. Is the backend running?", "error");
    btn.disabled  = false;
    btn.innerHTML = 'Login <i class="bi bi-arrow-right ms-1"></i>';
  }
});

function showToast(message, type = "success") {
  const el = document.createElement("div");
  el.className = `toast-alert ${type}`;
  el.innerHTML = `<span>${type === "success" ? "✓" : "✕"}</span> ${message}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3800);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
