<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Dr. Maaz Khan</title>
  <script>(function(){const t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-bs-theme",t);})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- Minimal Navbar -->
<nav class="navbar fixed-top" id="mainNav">
  <div class="container d-flex align-items-center justify-content-between" style="padding:12px 24px">
    <a class="navbar-brand" href="index.html"><span class="brand-cross">✦</span> Dr. Maaz Khan</a>
    <div class="d-flex gap-2 align-items-center">
      <a class="btn btn-outline-primary btn-sm" href="signup.html">Sign Up</a>
      <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode">🌙</button>
    </div>
  </div>
</nav>

<section class="auth-section">
  <div class="auth-card">
    <div class="auth-logo"><span class="brand-cross">✦</span> Dr. Maaz Khan</div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Login to manage your appointments</p>

    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label class="form-label" for="login-email">Email Address</label>
        <div class="input-wrap">
          <i class="bi bi-envelope"></i>
          <input type="email" id="login-email" class="form-control" placeholder="you@email.com" required autocomplete="email"/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label" for="login-password">Password</label>
        <div class="input-wrap" style="position:relative">
          <i class="bi bi-lock"></i>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password"/>
          <button type="button" class="pwd-toggle" id="pwdToggle" aria-label="Show/hide password">
            <i class="bi bi-eye" id="pwdIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg" id="loginBtn">
        Login <i class="bi bi-arrow-right ms-1"></i>
      </button>
    </form>

    <div class="divider">or continue with</div>

    <a href="https://mak-iqvm.onrender.com/api/auth/google" class="btn-google">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" aria-hidden="true"/>
      Continue with Google
    </a>

    <p class="auth-footer-text">Don't have an account? <a href="signup.html">Create one →</a></p>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
const API = window.API || "https://mak-iqvm.onrender.com";

// ── Handle Google OAuth token redirect ──────────────────────
const params      = new URLSearchParams(window.location.search);
const oauthToken  = params.get("token");
const oauthError  = params.get("error");

if (oauthError) {
  showToast("Google sign-in failed. Please try again.", "error");
  history.replaceState({}, "", window.location.pathname);
}

if (oauthToken) {
  localStorage.setItem("token", oauthToken);
  history.replaceState({}, "", window.location.pathname); // Remove token from URL
  showToast("Login successful! Redirecting…");
  const dest = sessionStorage.getItem("redirectAfterLogin") || "index.html";
  sessionStorage.removeItem("redirectAfterLogin");
  setTimeout(() => window.location.href = dest, 1000);
}

// ── Password toggle ──────────────────────────────────────────
document.getElementById("pwdToggle").addEventListener("click", () => {
  const inp  = document.getElementById("login-password");
  const icon = document.getElementById("pwdIcon");
  const show = inp.type === "password";
  inp.type   = show ? "text" : "password";
  icon.className = show ? "bi bi-eye-slash" : "bi bi-eye";
});

// ── Login form ───────────────────────────────────────────────
document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const btn      = document.getElementById("loginBtn");
  const email    = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;

  if (!email || !password) {
    showToast("Please fill in all fields.", "error"); return;
  }

  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in…';

  try {
    const res  = await fetch(`${API}/api/auth/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json().catch(() => ({}));

    if (res.ok && data.token) {
      localStorage.setItem("token", data.token);
      if (data.user) localStorage.setItem("user", JSON.stringify(data.user));
      showToast("Login successful! Redirecting…");
      const dest = sessionStorage.getItem("redirectAfterLogin") || "index.html";
      sessionStorage.removeItem("redirectAfterLogin");
      setTimeout(() => window.location.href = dest, 1200);
    } else {
      showToast(data.message || "Login failed. Check your credentials.", "error");
      btn.disabled  = false;
      btn.innerHTML = 'Login <i class="bi bi-arrow-right ms-1"></i>';
    }
  } catch {
    showToast("Cannot connect to server. Please try again.", "error");
    btn.disabled  = false;
    btn.innerHTML = 'Login <i class="bi bi-arrow-right ms-1"></i>';
  }
});

// ── Dark toggle (login page doesn't load full navbar) ────────
const darkToggle = document.getElementById("darkToggle");
if (darkToggle) {
  darkToggle.textContent = document.documentElement.getAttribute("data-bs-theme") === "dark" ? "☀️" : "🌙";
  darkToggle.addEventListener("click", () => {
    const next = document.documentElement.getAttribute("data-bs-theme") === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-bs-theme", next);
    localStorage.setItem("theme", next);
    darkToggle.textContent = next === "dark" ? "☀️" : "🌙";
  });
}
</script>
</body>
</html>
