<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Dr. Maaz Khan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
  <div class="container">
    <a class="navbar-brand" href="index.html"><span class="brand-cross">✦</span> </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list"></i>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <li class="nav-item" id="navDashboardItem">
          <a class="nav-link active" href="dashboard.html"><i class="bi bi-grid-1x2 me-1"></i>Dashboard</a>
        </li>
        <li class="nav-item ms-lg-2">
          <!-- FIX: Dashboard always shows Logout when you're here -->
          <button class="btn btn-primary nav-btn" id="logoutBtn">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
          </button>
        </li>
        <li class="nav-item ms-1">
          <button class="dark-toggle" id="darkToggle" title="Toggle dark mode">🌙</button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- DASHBOARD -->
<section class="dashboard-page">
  <div class="container">
    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-5">
      <div>
        <span class="section-label">Patient Portal</span>
        <h2 class="section-title mt-2 mb-0">My <em>Appointments</em></h2>
      </div>
      <a href="contact.html" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i> Book New
      </a>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="text-center py-5">
      <div class="spinner-border text-primary" role="status" style="width:2.5rem;height:2.5rem"></div>
      <p class="mt-3 text-muted">Loading your appointments…</p>
    </div>

    <!-- Appointments Grid -->
    <div class="row g-4" id="appointmentsGrid" style="display:none!important"></div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="empty-icon"><i class="bi bi-calendar2-x"></i></div>
      <h4 class="mb-2">No Appointments Yet</h4>
      <p class="text-muted mb-4">You haven't booked any appointments. Schedule one now!</p>
      <a href="contact.html" class="btn btn-primary btn-lg">
        <i class="bi bi-calendar2-plus me-2"></i>Book Appointment
      </a>
    </div>

    <!-- Error State -->
    <div id="errorState" class="empty-state" style="display:none">
      <div class="empty-icon" style="background:#fee2e2;color:#dc2626"><i class="bi bi-exclamation-triangle"></i></div>
      <h4 class="mb-2">Could Not Load Appointments</h4>
      <p id="errorMsg" class="text-muted mb-4"></p>
      <button class="btn btn-primary" onclick="loadAppointments()">Try Again</button>
    </div>
  </div>
</section>

<script>
// FIX: Auth guard — redirect if not logged in
const token = localStorage.getItem("token");

if (!token) {
  alert("Please login first.");
  window.location.href = "login.html";
}

// Logout
document.getElementById("logoutBtn").addEventListener("click", () => {
  localStorage.removeItem("token");
  window.location.href = "login.html";
});

async function loadAppointments() {
  const grid    = document.getElementById("appointmentsGrid");
  const loading = document.getElementById("loadingState");
  const empty   = document.getElementById("emptyState");
  const errDiv  = document.getElementById("errorState");
  const errMsg  = document.getElementById("errorMsg");

  loading.style.display = "";
  grid.style.removeProperty("display");
  grid.style.display    = "none";
  empty.style.display   = "none";
  errDiv.style.display  = "none";
  grid.innerHTML        = "";

  try {
    const res  = await fetch("http://localhost:5000/api/appointments", {
      headers: { Authorization: token }
    });

    const text = await res.text();
    let data;

    try {
      data = JSON.parse(text);
    } catch {
      throw new Error(text || "Server returned invalid response.");
    }

    loading.style.display = "none";

    if (!Array.isArray(data) || data.length === 0) {
      empty.style.display = "";
      return;
    }

    // Render cards
    grid.style.removeProperty("display");
    data.forEach(a => {
      const dateStr = a.date
        ? new Date(a.date).toLocaleDateString("en-IN", { day:"numeric", month:"long", year:"numeric" })
        : "Date TBD";

      grid.innerHTML += `
        <div class="col-md-6 col-lg-4">
          <div class="appt-card">
            <div class="appt-date">
              <i class="bi bi-calendar2-check"></i>
              ${dateStr}
              <span class="appt-badge ms-auto"><i class="bi bi-check-circle-fill"></i> Confirmed</span>
            </div>
            <p class="appt-msg">${a.message || "No message provided."}</p>
          </div>
        </div>
      `;
    });

  } catch (err) {
    loading.style.display = "none";
    errDiv.style.display  = "";
    errMsg.textContent    = err.message || "Unexpected error. Check the console.";
    console.error("Dashboard error:", err);
  }
}

loadAppointments();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
